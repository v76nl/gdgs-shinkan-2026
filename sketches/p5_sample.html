<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>p5.js Background Sketch</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent; /* 背景を透過してスライドの色を活かす */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script>
    let particles = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle());
      }
    }

    function draw() {
      clear(); // 背景を透過させる
      
      // パーティクル同士を線で結ぶ（近くにいる場合）
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].display();
        particles[i].checkEdges();
        
        for (let j = i + 1; j < particles.length; j++) {
            let d = dist(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
            if (d < 120) {
                stroke(100, 150, 255, map(d, 0, 120, 150, 0));
                strokeWeight(1);
                line(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
            }
        }
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    class Particle {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.vel = p5.Vector.random2D().mult(random(0.5, 2));
        this.size = random(3, 8);
      }
      
      update() {
        this.pos.add(this.vel);
      }
      
      display() {
        noStroke();
        fill(50, 100, 255, 180);
        ellipse(this.pos.x, this.pos.y, this.size);
      }
      
      checkEdges() {
        if (this.pos.x > width || this.pos.x < 0) this.vel.x *= -1;
        if (this.pos.y > height || this.pos.y < 0) this.vel.y *= -1;
      }
    }
  </script>
</body>
</html>
